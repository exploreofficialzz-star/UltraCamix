name: CamixUltra CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L --retry 3 --retry-delay 5 \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=120000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          chmod +x gradlew

      - name: Run unit tests
        run: |
          ./gradlew test --stacktrace 2>&1 | tee build.log
          EXIT=${PIPESTATUS[0]}
          echo "=== ALL KOTLIN ERRORS ==="
          grep "^e: " build.log || echo "No e: lines found"
          echo "=== CAUSED BY ==="
          grep -A 3 "Caused by:" build.log | head -60 || true
          exit $EXIT

      - name: Show full error section on failure
        if: failure()
        run: |
          echo "====== KOTLIN COMPILER ERRORS ======"
          grep "^e: " build.log | head -80 || true
          echo "====== LAST 400 LINES ======"
          tail -400 build.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L --retry 3 --retry-delay 5 \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=120000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
          EXIT=${PIPESTATUS[0]}
          grep "^e: " build.log || true
          exit $EXIT

      - name: Show errors on failure
        if: failure()
        run: |
          grep "^e: " build.log | head -80 || true
          tail -300 build.log

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CamixUltra-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk

  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 35
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    env:
      HAS_FIREBASE: ${{ secrets.FIREBASE_APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L --retry 3 --retry-delay 5 \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          networkTimeout=120000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          chmod +x gradlew

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode \
            > $GITHUB_WORKSPACE/app/camixultra-release.jks
          ls -lh $GITHUB_WORKSPACE/app/camixultra-release.jks

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/camixultra-release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.RELEASE_KEYSTORE_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.RELEASE_KEYSTORE_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.RELEASE_KEYSTORE_KEY_PASSWORD }} \
            --stacktrace

      - name: Remove keystore from runner
        if: always()
        run: rm -f $GITHUB_WORKSPACE/app/camixultra-release.jks

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: CamixUltra-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk

      - name: Upload to Firebase App Distribution
        if: env.HAS_FIREBASE == 'true'
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:        ${{ secrets.FIREBASE_APP_ID }}
          token:        ${{ secrets.FIREBASE_TOKEN }}
          groups:       testers
          file:         app/build/outputs/apk/release/app-release.apk
          releaseNotes: "Build ${{ github.sha }}"

  deploy-play:
    name: Deploy to Google Play
    runs-on: ubuntu-latest
    needs: build-release
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Download signed APK
        uses: actions/download-artifact@v4
        with:
          name: CamixUltra-release-${{ github.sha }}
          path: release/

      - name: Upload to Google Play Internal Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName:                 ${{ secrets.GOOGLE_PLAY_PACKAGE_NAME }}
          releaseFiles:                release/*.apk
          track:                       internal
          status:                      completed
